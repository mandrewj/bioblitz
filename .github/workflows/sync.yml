name: Weekly data sync

on:
  schedule:
    # Mondays + Thursdays 09:00 UTC ≈ 5am EDT / 4am EST.
    # GitHub may delay scheduled runs under load; manual dispatch always works.
    - cron: "0 9 * * 1,4"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run sync

      - name: Commit and push data changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "no data changes — skipping commit"
            exit 0
          fi
          git commit -m "data: weekly sync $(date -u +%Y-%m-%d)"
          git push
